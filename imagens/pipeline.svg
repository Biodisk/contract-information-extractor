<svg width="680" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Pipeline do Minerador de Contratos</title>
  <desc>Diagrama do pipeline de extração automatizada de contratos em PDF, desde a entrada de documentos até a geração do Excel.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th  { font-size: 14px; font-weight: 600; fill: #2C2C2A; }
      .ts  { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .lbl { font-size: 11px; font-weight: 400; fill: #888780; }
    </style>
  </defs>

  <!-- ══ ENTRADA ══ -->
  <rect x="200" y="30" width="280" height="52" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text class="th" x="340" y="53" text-anchor="middle" dominant-baseline="central">Pasta de entrada</text>
  <text class="ts" x="340" y="70" text-anchor="middle" dominant-baseline="central">PDFs organizados em subpastas</text>

  <line x1="340" y1="82" x2="340" y2="114" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ══ DOCLING ══ -->
  <rect x="160" y="116" width="360" height="68" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.8"/>
  <text class="th" x="340" y="142" text-anchor="middle" dominant-baseline="central" fill="#26215C">Docling  (IBM Research)</text>
  <text class="ts" x="340" y="162" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Conversão PDF → texto estruturado · 100% local · MIT</text>

  <line x1="340" y1="184" x2="340" y2="216" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ══ PRÉ-PROCESSAMENTO ══ -->
  <rect x="160" y="218" width="360" height="68" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.8"/>
  <text class="th" x="340" y="244" text-anchor="middle" dominant-baseline="central" fill="#04342C">Pré-processamento</text>
  <text class="ts" x="340" y="264" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Cache JSON por página · normalização · paginação</text>

  <line x1="340" y1="286" x2="340" y2="318" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ══ EXTRAÇÃO HÍBRIDA – container ══ -->
  <rect x="100" y="320" width="480" height="210" rx="14" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="6 4"/>
  <text class="lbl" x="120" y="338" dominant-baseline="central">Extração híbrida</text>

  <!-- Bloco regex -->
  <rect x="120" y="352" width="200" height="156" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.8"/>
  <text class="th" x="220" y="376" text-anchor="middle" dominant-baseline="central" fill="#04342C">Regex / validação</text>
  <text class="ts" x="220" y="398" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">NÚMERO · DATA</text>
  <text class="ts" x="220" y="416" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">TERMO INICIAL / FINAL</text>
  <text class="ts" x="220" y="434" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">CNPJ/CPF + dígito verificador</text>
  <text class="ts" x="220" y="452" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">ESPÉCIE · TIPO · ITEM</text>
  <text class="ts" x="220" y="470" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">DOCUMENTO · PROGRAMA</text>

  <!-- Bloco LLM -->
  <rect x="360" y="352" width="200" height="156" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.8"/>
  <text class="th" x="460" y="376" text-anchor="middle" dominant-baseline="central" fill="#26215C">LLM local (Ollama)</text>
  <text class="ts" x="460" y="398" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Qwen2.5-7B · GPU local</text>
  <text class="ts" x="460" y="420" text-anchor="middle" dominant-baseline="central" fill="#534AB7">RAZÃO SOCIAL / NOME</text>
  <text class="ts" x="460" y="442" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Structured Outputs</text>
  <text class="ts" x="460" y="464" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Cache global por CNPJ</text>
  <text class="ts" x="460" y="486" text-anchor="middle" dominant-baseline="central" fill="#534AB7">num_ctx 8192</text>

  <line x1="340" y1="530" x2="340" y2="562" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ══ VALIDAÇÃO ══ -->
  <rect x="160" y="564" width="360" height="68" rx="10" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.8"/>
  <text class="th" x="340" y="590" text-anchor="middle" dominant-baseline="central" fill="#412402">Validação &amp; consolidação</text>
  <text class="ts" x="340" y="610" text-anchor="middle" dominant-baseline="central" fill="#854F0B">CNPJ matemático · deduplicação · confiança de campo</text>

  <line x1="340" y1="632" x2="340" y2="664" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ══ GERAÇÃO DO EXCEL ══ -->
  <rect x="160" y="666" width="360" height="68" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.8"/>
  <text class="th" x="340" y="692" text-anchor="middle" dominant-baseline="central" fill="#04342C">Geração do Excel</text>
  <text class="ts" x="340" y="712" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">pandas · openpyxl · encoding UTF-8-sig</text>

  <line x1="340" y1="734" x2="340" y2="766" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ══ RESULTADO ══ -->
  <rect x="200" y="768" width="280" height="34" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text class="th" x="340" y="785" text-anchor="middle" dominant-baseline="central">Planilha de contratos  (13 campos)</text>

  <!-- Anotação lateral: hardware -->
  <line x1="158" y1="430" x2="94" y2="430" stroke="#B4B2A9" stroke-width="0.6" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="lbl" x="90" y="422" text-anchor="end">RTX 3060</text>
  <text class="lbl" x="90" y="438" text-anchor="end">100% local</text>

  <!-- Anotação lateral: progresso -->
  <line x1="522" y1="600" x2="586" y2="600" stroke="#B4B2A9" stroke-width="0.6" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="lbl" x="590" y="594">barra de progresso</text>
  <text class="lbl" x="590" y="610">adaptativa</text>
</svg>
