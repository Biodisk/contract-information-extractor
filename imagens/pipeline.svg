<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Pipeline do Minerador de Contratos</title>
  <desc>Diagrama do pipeline de extra&#xe7;&#xe3;o automatizada de contratos em PDF.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ENTRADA -->
  <rect x="200" y="30" width="280" height="52" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" x="340" y="53" text-anchor="middle" dominant-baseline="central">Pasta de entrada</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="400" fill="#5F5E5A" x="340" y="70" text-anchor="middle" dominant-baseline="central">PDFs organizados em subpastas</text>

  <line x1="340" y1="82" x2="340" y2="114" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- DOCLING -->
  <rect x="160" y="116" width="360" height="68" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.8"/>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="#26215C" x="340" y="142" text-anchor="middle" dominant-baseline="central">Docling (IBM Research)</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="400" fill="#534AB7" x="340" y="162" text-anchor="middle" dominant-baseline="central">Convers&#xe3;o PDF para texto estruturado &#xb7; 100% local &#xb7; MIT</text>

  <line x1="340" y1="184" x2="340" y2="216" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- PR&#xc9;-PROCESSAMENTO -->
  <rect x="160" y="218" width="360" height="68" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.8"/>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="#04342C" x="340" y="244" text-anchor="middle" dominant-baseline="central">Pr&#xe9;-processamento</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="400" fill="#0F6E56" x="340" y="264" text-anchor="middle" dominant-baseline="central">Cache JSON por p&#xe1;gina &#xb7; normaliza&#xe7;&#xe3;o &#xb7; pagina&#xe7;&#xe3;o</text>

  <line x1="340" y1="286" x2="340" y2="318" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- EXTRA&#xc7;&#xc3;O H&#xcd;BRIDA container -->
  <rect x="100" y="320" width="480" height="210" rx="14" fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="6 4"/>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="400" fill="#888780" x="120" y="338" dominant-baseline="central">Extra&#xe7;&#xe3;o h&#xed;brida</text>

  <!-- Regex -->
  <rect x="120" y="352" width="200" height="156" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.8"/>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="#04342C" x="220" y="376" text-anchor="middle" dominant-baseline="central">Regex / valida&#xe7;&#xe3;o</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="400" fill="#0F6E56" x="220" y="398" text-anchor="middle" dominant-baseline="central">N&#xda;MERO &#xb7; DATA</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="400" fill="#0F6E56" x="220" y="416" text-anchor="middle" dominant-baseline="central">TERMO INICIAL / FINAL</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="400" fill="#0F6E56" x="220" y="434" text-anchor="middle" dominant-baseline="central">CNPJ/CPF + d&#xed;gito verificador</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="400" fill="#0F6E56" x="220" y="452" text-anchor="middle" dominant-baseline="central">ESP&#xc9;CIE &#xb7; TIPO &#xb7; ITEM</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="400" fill="#0F6E56" x="220" y="470" text-anchor="middle" dominant-baseline="central">DOCUMENTO &#xb7; PROGRAMA</text>

  <!-- LLM -->
  <rect x="360" y="352" width="200" height="156" rx="10" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.8"/>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="#26215C" x="460" y="376" text-anchor="middle" dominant-baseline="central">LLM local (Ollama)</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="400" fill="#534AB7" x="460" y="398" text-anchor="middle" dominant-baseline="central">Qwen2.5-7B &#xb7; GPU local</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="400" fill="#534AB7" x="460" y="420" text-anchor="middle" dominant-baseline="central">RAZ&#xc3;O SOCIAL / NOME</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="400" fill="#534AB7" x="460" y="442" text-anchor="middle" dominant-baseline="central">Structured Outputs</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="400" fill="#534AB7" x="460" y="464" text-anchor="middle" dominant-baseline="central">Cache global por CNPJ</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="400" fill="#534AB7" x="460" y="486" text-anchor="middle" dominant-baseline="central">num_ctx 8192</text>

  <line x1="340" y1="530" x2="340" y2="562" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- VALIDA&#xc7;&#xc3;O -->
  <rect x="160" y="564" width="360" height="68" rx="10" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.8"/>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="#412402" x="340" y="590" text-anchor="middle" dominant-baseline="central">Valida&#xe7;&#xe3;o e consolida&#xe7;&#xe3;o</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="400" fill="#854F0B" x="340" y="610" text-anchor="middle" dominant-baseline="central">CNPJ matem&#xe1;tico &#xb7; deduplica&#xe7;&#xe3;o &#xb7; confian&#xe7;a de campo</text>

  <line x1="340" y1="632" x2="340" y2="664" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- EXCEL -->
  <rect x="160" y="666" width="360" height="68" rx="10" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.8"/>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="#04342C" x="340" y="692" text-anchor="middle" dominant-baseline="central">Gera&#xe7;&#xe3;o do Excel</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="400" fill="#0F6E56" x="340" y="712" text-anchor="middle" dominant-baseline="central">pandas &#xb7; openpyxl &#xb7; encoding UTF-8-sig</text>

  <line x1="340" y1="734" x2="340" y2="766" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- RESULTADO -->
  <rect x="200" y="768" width="280" height="34" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600" fill="#2C2C2A" x="340" y="785" text-anchor="middle" dominant-baseline="central">Planilha de contratos (13 campos)</text>

  <!-- Anota&#xe7;&#xe3;o esquerda -->
  <line x1="158" y1="430" x2="96" y2="430" stroke="#B4B2A9" stroke-width="0.6" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="400" fill="#888780" x="90" y="422" text-anchor="end">RTX 3060</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="400" fill="#888780" x="90" y="438" text-anchor="end">100% local</text>

  <!-- Anota&#xe7;&#xe3;o direita -->
  <line x1="522" y1="600" x2="584" y2="600" stroke="#B4B2A9" stroke-width="0.6" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="400" fill="#888780" x="588" y="594">barra de progresso</text>
  <text font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="400" fill="#888780" x="588" y="610">adaptativa</text>
</svg>
